services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ismart}
      POSTGRES_USER: ${POSTGRES_USER:-ismart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ismart_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.0
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    ports:
      - "${KAFKA_PORT:-9094}:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ismart:ismart_local_password@postgres:5432/ismart}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      FRONTEND_ORIGIN: http://localhost:${WEB_PORT:-3000}
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${PORT}/healthcheck | grep -q 'This is a api'"]
      interval: 10s
      timeout: 5s
      retries: 5

  transcriber:
    build:
      context: .
      dockerfile: apps/transcriber/Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${TRANSCRIBER_PORT:-8081}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      FRONTEND_ORIGIN: http://localhost:${WEB_PORT:-3000}
    ports:
      - "${TRANSCRIBER_PORT:-8081}:${TRANSCRIBER_PORT:-8081}"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${PORT}/healthcheck | grep -q 'This is a transcriber'"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8080}
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${PORT}/healthcheck | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
